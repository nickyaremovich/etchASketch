<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Etch-A-Sketch</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="flex-container"
        <div class="header">Etch-A-Sketch</div>
        <div class="pen">Pen: On</div>
        <div class="container">
            <div class="board"></div>
            <div class="buttons">
                <button onclick="changeColor('black')">Black</button>
                <button onclick="changeColor('white')">Eraser</button>
                <button onclick="changeColor('random')">Random</button>
                <button onclick="resetBoard()">Reset</button>
            </div>
            <div class="size">
                <input type="text" placeholder="Board Size" value="16" onchange="changeSize(this.value)" />
                <button>Confirm</button>
            </div>
        </div>    
    </div>
	<script src="main.js"></script>
  </body>
</html>
